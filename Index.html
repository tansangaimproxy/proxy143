<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY SERVER CHECK - Premium Edition</title>
    <style>
        /* CSS Phong cách VIP & Neon */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1b1b2f 0%, #0f0f1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        /* Hiệu ứng nền động nhẹ */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(0, 242, 254, 0.05) 50%, transparent 55%);
            animation: shine 10s infinite linear;
            z-index: -1;
        }

        @keyframes shine {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container {
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
        }

        h2 {
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            letter-spacing: 2px;
            animation: gradientText 3s linear infinite;
        }

        @keyframes gradientText {
            to { background-position: 200% center; }
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: #fff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        input:focus {
            border-color: #00f2fe;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        select option {
            background: #1b1b2f;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5);
            letter-spacing: 2.5px;
        }

        /* Modal thông báo */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(145deg, #1e1e2f, #151525);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 77, 77, 0.3);
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 20px 50px rgba(255, 77, 77, 0.2);
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        #modalTitle {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        #modalMessage {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }

        .close-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PROXY SERVER CHECK</h2>
    
    <input type="text" id="server" placeholder="Server:">
    <input type="text" id="port" placeholder="Port:">
    
    <select id="deno">
        <option value="20000">Mệnh giá: 20.000 VNĐ</option>
        <option value="50000">Mệnh giá: 50.000 VNĐ</option>
        <option value="100000">Mệnh giá: 100.000 VNĐ</option>
        <option value="200000">Mệnh giá: 200.000 VNĐ</option>
        <option value="500000">Mệnh giá: 500.000 VNĐ</option>
    </select>
    
    <input type="text" id="serial" placeholder="Seri thẻ:">
    <input type="text" id="pin" placeholder="Mã thẻ:">
    
    <button onclick="handleCheck()">CHECK NOW</button>
</div>

<div id="popupModal" class="modal">
    <div class="modal-content" id="modalFrame">
        <span class="modal-icon" id="modalIcon">⚠️</span>
        <h3 id="modalTitle">THÔNG BÁO</h3>
        <p id="modalMessage">Nội dung thông báo</p>
        <div class="close-btn" onclick="closePopup()">XÁC NHẬN</div>
    </div>
</div>

<script>
    let clickTracker = 0;

    function handleCheck() {
        clickTracker++;
        const modal = document.getElementById('popupModal');
        const title = document.getElementById('modalTitle');
        const message = document.getElementById('modalMessage');
        const frame = document.getElementById('modalFrame');
        const icon = document.getElementById('modalIcon');

        if (clickTracker === 1) {
            icon.innerText = "❌";
            frame.style.borderColor = "#ff4d4d";
            title.style.color = "#ff4d4d";
            title.innerText = "KẾT QUẢ";
            message.innerHTML = "Server và cổng đã bị khoá!<br>Vui lòng thử lại.";
        } else {
            icon.innerText = "🚫";
            frame.style.borderColor = "#ffcc00";
            title.style.color = "#ffcc00";
            title.innerText = "THÔNG BÁO";
            message.innerText = "Mã thẻ đã được sử dụng";
        }

        modal.classList.add('show');
    }
    
    function closePopup() {
        document.getElementById('popupModal').classList.remove('show');
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") closePopup();
    });
</script>

</body>
</html>
